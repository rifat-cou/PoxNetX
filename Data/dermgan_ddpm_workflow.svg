<svg viewBox="0 0 1680 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-labelledby="pipelineTitle">
<title id="pipelineTitle">Hybrid DermGAN-DDPM Generation Pipeline: Raw Image, Preprocessing, Autoencoder, Latent DDPM, Pix2Pix Refiner, Synthetic Output</title>

<defs>
  <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
  </marker>
</defs>

<rect x="0" y="0" width="1680" height="300" rx="20" fill="#fafbfc"/>

<text x="840" y="36" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Hybrid DermGAN-DDPM Generation Pipeline</text>
<text x="840" y="60" text-anchor="middle" font-size="14" fill="#64748b">Four-stage generative augmentation pipeline for synthetic pox lesion images</text>

<!-- Box 1: Raw Image -->
<g>
  <rect x="16" y="94" width="228" height="188" rx="18" fill="#06b6d4" opacity="0">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0;0.0833;0.1667;1" values="0;0;0.55;0;0"/>
  </rect>
  <rect x="20" y="90" width="220" height="180" rx="14" fill="#ffffff" stroke="#06b6d4" stroke-width="2.5"/>
  <rect x="28" y="98" width="204" height="34" rx="8" fill="#06b6d4"/>
  <text x="130" y="121" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Raw Image</text>
  <g transform="translate(130,172)">
    <rect x="-18" y="-14" width="36" height="28" rx="3" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="-6" cy="-4" r="3" fill="#06b6d4"/>
    <polyline points="-14,10 -4,-2 4,6 14,-6 18,10" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <text x="130" y="225" text-anchor="middle" font-size="12.5" fill="#475569">Input Skin Lesion</text>
  <circle cx="20" cy="90" r="20" fill="#06b6d4" stroke="#ffffff" stroke-width="3"/>
  <text x="20" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">1</text>
</g>

<!-- Box 2: Preprocessing -->
<g>
  <rect x="296" y="94" width="228" height="188" rx="18" fill="#3b82f6" opacity="0">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.1667;0.25;0.3333;1" values="0;0;0.55;0;0"/>
  </rect>
  <rect x="300" y="90" width="220" height="180" rx="14" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5"/>
  <rect x="308" y="98" width="204" height="34" rx="8" fill="#3b82f6"/>
  <text x="410" y="121" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Preprocessing</text>
  <g transform="translate(410,172)" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M-16,-6 L-16,-16 L-6,-16"/>
    <path d="M6,-16 L16,-16 L16,-6"/>
    <path d="M-16,6 L-16,16 L-6,16"/>
    <path d="M16,6 L16,16 L6,16"/>
  </g>
  <text x="410" y="200" text-anchor="middle" font-size="12" fill="#475569">Resize 256&#215;256</text>
  <text x="410" y="216" text-anchor="middle" font-size="12" fill="#475569">ROI Annotation (VIA)</text>
  <text x="410" y="232" text-anchor="middle" font-size="12" fill="#475569">Semantic Map + Split</text>
  <circle cx="300" cy="90" r="20" fill="#3b82f6" stroke="#ffffff" stroke-width="3"/>
  <text x="300" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">2</text>
</g>

<!-- Box 3: Autoencoder -->
<g>
  <rect x="576" y="94" width="228" height="188" rx="18" fill="#6366f1" opacity="0">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.3333;0.4167;0.5;1" values="0;0;0.55;0;0"/>
  </rect>
  <rect x="580" y="90" width="220" height="180" rx="14" fill="#ffffff" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="588" y="98" width="204" height="34" rx="8" fill="#6366f1"/>
  <text x="690" y="121" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Autoencoder</text>
  <g transform="translate(690,172)">
    <polygon points="-16,-14 16,-14 0,0" fill="#6366f1" opacity="0.85"/>
    <polygon points="-16,14 16,14 0,0" fill="#6366f1" opacity="0.55"/>
  </g>
  <text x="690" y="206" text-anchor="middle" font-size="12" fill="#475569">Encoder &#8594; Latent</text>
  <text x="690" y="222" text-anchor="middle" font-size="12" fill="#475569">16&#215;16&#215;64 &#8594; Decoder</text>
  <circle cx="580" cy="90" r="20" fill="#6366f1" stroke="#ffffff" stroke-width="3"/>
  <text x="580" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">3</text>
</g>

<!-- Box 4: Latent DDPM -->
<g>
  <rect x="856" y="94" width="228" height="188" rx="18" fill="#8b5cf6" opacity="0">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.5;0.5833;0.6667;1" values="0;0;0.55;0;0"/>
  </rect>
  <rect x="860" y="90" width="220" height="180" rx="14" fill="#ffffff" stroke="#8b5cf6" stroke-width="2.5"/>
  <rect x="868" y="98" width="204" height="34" rx="8" fill="#8b5cf6"/>
  <text x="970" y="121" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Latent DDPM</text>
  <g transform="translate(970,172)">
    <g>
      <path d="M -14,2 A14,14 0 1 1 10,12" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="10,12 16,8 16,17" fill="#8b5cf6"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="3s" repeatCount="indefinite"/>
    </g>
  </g>
  <text x="970" y="206" text-anchor="middle" font-size="12" fill="#475569">Add Noise (&#946;-schedule)</text>
  <text x="970" y="222" text-anchor="middle" font-size="12" fill="#475569">U-Net Iterative Denoise</text>
  <circle cx="860" cy="90" r="20" fill="#8b5cf6" stroke="#ffffff" stroke-width="3"/>
  <text x="860" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">4</text>
</g>

<!-- Box 5: Pix2Pix Refiner -->
<g>
  <rect x="1136" y="94" width="228" height="188" rx="18" fill="#ec4899" opacity="0">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.6667;0.75;0.8333;1" values="0;0;0.55;0;0"/>
  </rect>
  <rect x="1140" y="90" width="220" height="180" rx="14" fill="#ffffff" stroke="#ec4899" stroke-width="2.5"/>
  <rect x="1148" y="98" width="204" height="34" rx="8" fill="#ec4899"/>
  <text x="1250" y="121" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Pix2Pix Refiner</text>
  <g transform="translate(1250,172)">
    <rect x="-20" y="-9" width="18" height="18" rx="3" fill="none" stroke="#ec4899" stroke-width="2"/>
    <text x="-11" y="4" text-anchor="middle" font-size="10" font-weight="700" fill="#ec4899">G</text>
    <rect x="2" y="-9" width="18" height="18" rx="3" fill="none" stroke="#ec4899" stroke-width="2"/>
    <text x="11" y="4" text-anchor="middle" font-size="10" font-weight="700" fill="#ec4899">D</text>
    <g>
      <line x1="-2" y1="0" x2="2" y2="0" stroke="#ec4899" stroke-width="2" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)"/>
      <animate attributeName="opacity" values="1;0.25;1" dur="1.2s" repeatCount="indefinite"/>
    </g>
  </g>
  <text x="1250" y="206" text-anchor="middle" font-size="12" fill="#475569">Generator &#8596; PatchGAN</text>
  <text x="1250" y="222" text-anchor="middle" font-size="12" fill="#475569">Adversarial + L1 Loss</text>
  <circle cx="1140" cy="90" r="20" fill="#ec4899" stroke="#ffffff" stroke-width="3"/>
  <text x="1140" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">5</text>
</g>

<!-- Box 6: Synthetic Output -->
<g>
  <rect x="1416" y="94" width="228" height="188" rx="18" fill="#10b981" opacity="0">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.8333;0.9167;1;1" values="0;0;0.55;0;0"/>
  </rect>
  <rect x="1420" y="90" width="220" height="180" rx="14" fill="#ffffff" stroke="#10b981" stroke-width="2.5"/>
  <rect x="1428" y="98" width="204" height="34" rx="8" fill="#10b981"/>
  <text x="1530" y="121" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Synthetic Output</text>
  <g transform="translate(1530,172)">
    <circle r="16" fill="none" stroke="#10b981" stroke-width="2.5"/>
    <polyline points="-7,0 -2,6 8,-8" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1530" y="206" text-anchor="middle" font-size="12" fill="#475569">Quality-Filtered</text>
  <text x="1530" y="222" text-anchor="middle" font-size="12" fill="#475569">Synthetic Lesion Image</text>
  <circle cx="1420" cy="90" r="20" fill="#10b981" stroke="#ffffff" stroke-width="3"/>
  <text x="1420" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">6</text>
</g>

<!-- Connecting arrows with marching-ants flow -->
<g stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrowhead)">
  <path d="M240,180 L300,180" stroke-dasharray="8 6">
    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="0.8s" repeatCount="indefinite"/>
  </path>
  <path d="M520,180 L580,180" stroke-dasharray="8 6">
    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="0.8s" repeatCount="indefinite"/>
  </path>
  <path d="M800,180 L860,180" stroke-dasharray="8 6">
    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="0.8s" repeatCount="indefinite"/>
  </path>
  <path d="M1080,180 L1140,180" stroke-dasharray="8 6">
    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="0.8s" repeatCount="indefinite"/>
  </path>
  <path d="M1360,180 L1420,180" stroke-dasharray="8 6">
    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="0.8s" repeatCount="indefinite"/>
  </path>
</g>

<!-- Traveling data-packet dots, synced to the box pulse relay -->
<circle r="6" fill="#f59e0b" stroke="#ffffff" stroke-width="2">
  <animate attributeName="r" values="5;7;5" dur="0.6s" repeatCount="indefinite"/>
  <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear"
    keyTimes="0;0.0833;0.25;1" keyPoints="0;0;1;1" path="M240,180 L300,180"/>
</circle>
<circle r="6" fill="#f59e0b" stroke="#ffffff" stroke-width="2">
  <animate attributeName="r" values="5;7;5" dur="0.6s" repeatCount="indefinite"/>
  <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear"
    keyTimes="0;0.25;0.4167;1" keyPoints="0;0;1;1" path="M520,180 L580,180"/>
</circle>
<circle r="6" fill="#f59e0b" stroke="#ffffff" stroke-width="2">
  <animate attributeName="r" values="5;7;5" dur="0.6s" repeatCount="indefinite"/>
  <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear"
    keyTimes="0;0.4167;0.5833;1" keyPoints="0;0;1;1" path="M800,180 L860,180"/>
</circle>
<circle r="6" fill="#f59e0b" stroke="#ffffff" stroke-width="2">
  <animate attributeName="r" values="5;7;5" dur="0.6s" repeatCount="indefinite"/>
  <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear"
    keyTimes="0;0.5833;0.75;1" keyPoints="0;0;1;1" path="M1080,180 L1140,180"/>
</circle>
<circle r="6" fill="#f59e0b" stroke="#ffffff" stroke-width="2">
  <animate attributeName="r" values="5;7;5" dur="0.6s" repeatCount="indefinite"/>
  <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear"
    keyTimes="0;0.75;0.9167;1" keyPoints="0;0;1;1" path="M1360,180 L1420,180"/>
</circle>

</svg>
